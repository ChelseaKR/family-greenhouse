name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  AWS_REGION: us-east-1
  ENVIRONMENT: production
  # Bucket holding per-version Lambda zips that auto-rollback restores from.
  ARTIFACT_BUCKET: family-greenhouse-tfstate-014248889144
  # Stable across retries: a completed pre-deploy snapshot is reused rather
  # than overwritten with assets from a failed first attempt.
  FRONTEND_SNAPSHOT_PREFIX: frontend-snapshots/${{ github.run_id }}

# Least-privilege default: read-only token. Jobs that assume an AWS role via
# OIDC (aws-actions/configure-aws-credentials) grant `id-token: write` at the
# job level below; every other job runs with the read-only default.
permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Determine version
        id: version
        # Workflow-dispatch input flows through an env var, never ${{ }}
        # interpolation inside `run:` — github context in a run script is a
        # shell-injection vector (semgrep run-shell-injection).
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" == "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version format
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

      - name: Require main for manual production dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          DISPATCH_REF: ${{ github.ref }}
        run: |
          if [ "$DISPATCH_REF" != "refs/heads/main" ]; then
            echo "::error::Manual production deploys must be dispatched from main (received ${DISPATCH_REF})."
            exit 1
          fi

      - name: Checkout tagged ref
        # Needed for the version/CHANGELOG/signature checks below — they read
        # package.json and CHANGELOG.md AS OF the tag being deployed, not the
        # workflow-triggering ref.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.version.outputs.version }}
          fetch-depth: 0

      - name: Resolve tagged commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Tag <-> package.json version consistency (REL-02/REL-03)
        # Closes the exact gap the 2026-07-05 audit flagged: tags advanced to
        # v0.13.1 while every package.json stayed frozen at 0.1.0. Blocking —
        # a mismatch here means the release-version bump was forgotten.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          expected="${VERSION#v}"
          for f in package.json frontend/package.json backend/package.json; do
            actual=$(node -p "require('./${f}').version")
            if [ "$actual" != "$expected" ]; then
              echo "::error::${f} version ($actual) does not match tag ${VERSION} (expected $expected)"
              exit 1
            fi
          done
          echo "package.json versions match tag ${VERSION} across root/frontend/backend."

      - name: CHANGELOG has an entry for this release (REL-10)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          expected="${VERSION#v}"
          if ! grep -qF "## [${expected}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${expected}]' entry for tag ${VERSION}. Add one in the release PR before tagging."
            exit 1
          fi
          echo "CHANGELOG.md has an entry for ${expected}."

      - name: Tag signature (REL-08, advisory for now)
        # NOT yet hard-blocking: `git config tag.gpgSign true` was set locally
        # as of this remediation pass (2026-07-05), but no release has been
        # signed under it yet, and the maintainer's GPG/gitsign identity may
        # not be provisioned in this CI runner. Hard-failing here would block
        # the very next release on a signing setup that hasn't happened yet —
        # the safer default is to warn loudly until at least one signed tag
        # exists, then flip this to `exit 1` on failure.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git verify-tag "$VERSION" 2>&1; then
            echo "Tag $VERSION is signed and verified."
          else
            echo "::warning::Tag ${VERSION} is not signed (or has no verifiable signature). REL-08 wants signed release tags — see docs/RESPONSIBLE-TECH-AUDITS.md. This is advisory only until the signing setup is confirmed working; make it blocking once the first signed tag lands."
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Setup Node.js
        # No `cache: 'npm'` here (CICD-24 / §8c): this job builds the exact
        # frontend+backend artifacts the downstream jobs deploy to production,
        # so a poisoned Actions cache entry would flow straight into the prod
        # Lambda bundles and the live site. Release/publish builds stay
        # cache-free; only PR-triggered CI jobs may cache (ci.yml does).
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.PRODUCTION_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.PRODUCTION_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ env.AWS_REGION }}
          VITE_GIT_SHA: ${{ needs.validate.outputs.commit_sha }}
          # Streaming chat feature flag: set the PRODUCTION_CHAT_STREAM_URL
          # repo variable to the `chat_stream_url` terraform output to turn
          # SSE streaming on; leave it unset (empty → falsy) to keep the
          # synchronous /chat/messages path. Default OFF.
          VITE_CHAT_STREAM_URL: ${{ vars.PRODUCTION_CHAT_STREAM_URL }}
        run: npm run build

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist-${{ needs.validate.outputs.version }}
          path: frontend/dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-dist-${{ needs.validate.outputs.version }}
          path: backend/dist

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [validate, build]
    # OIDC: assumes AWS_PRODUCTION_ROLE_ARN via configure-aws-credentials.
    permissions:
      id-token: write
      contents: read
    # `terraform apply -auto-approve` runs FIRST and can replace Cognito / DDB
    # / CloudFront / IAM. Gate it behind the same `production` environment as
    # deploy-backend so the prod infra apply requires a reviewer approval too —
    # otherwise any `v*` tag triggers an unreviewed infrastructure mutation.
    environment: production
    defaults:
      run:
        working-directory: infrastructure
    outputs:
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
      site_url: ${{ steps.outputs.outputs.site_url }}
      api_url: ${{ steps.outputs.outputs.api_url }}
      cognito_user_pool_id: ${{ steps.outputs.outputs.cognito_user_pool_id }}
      dynamodb_table_name: ${{ steps.outputs.outputs.dynamodb_table_name }}
      registration_snapshot_ready: ${{ steps.registration_snapshot.outputs.ready }}
      cognito_user_pool_id_before: ${{ steps.registration_snapshot.outputs.user_pool_id }}
      public_registration_enabled_before: ${{ steps.registration_snapshot.outputs.public_registration_enabled }}
      admin_create_user_only_before: ${{ steps.registration_snapshot.outputs.admin_create_user_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Snapshot Cognito registration policy
        id: registration_snapshot
        run: |
          set -euo pipefail
          USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)
          ADMIN_ONLY=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$USER_POOL_ID" \
            --query 'UserPool.AdminCreateUserConfig.AllowAdminCreateUserOnly' \
            --output text)

          case "$ADMIN_ONLY" in
            True) REGISTRATION_ENABLED=false ;;
            False) REGISTRATION_ENABLED=true ;;
            *)
              echo "::error::Unexpected Cognito AllowAdminCreateUserOnly value: ${ADMIN_ONLY}"
              exit 1
              ;;
          esac

          {
            echo "user_pool_id=${USER_POOL_ID}"
            echo "public_registration_enabled=${REGISTRATION_ENABLED}"
            echo "admin_create_user_only=${ADMIN_ONLY}"
            echo "ready=true"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        # Stripe secrets are injected as TF_VARs from GitHub Actions secrets so
        # the sensitive values never land in the committed tfvars. Unset secrets
        # resolve to "" → Stripe stays inert (the pre-billing behavior), so this
        # is safe before the secrets are populated. The non-secret price IDs
        # live in environments/production/terraform.tfvars. The plan bakes these
        # into tfplan, so only this step needs them (apply consumes tfplan).
        env:
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_git_sha: ${{ needs.validate.outputs.commit_sha }}
        run: terraform plan -var-file=environments/production/terraform.tfvars -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get outputs
        id: outputs
        run: |
          {
            echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)"
            echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "site_url=$(terraform output -raw site_url)"
            echo "api_url=$(terraform output -raw api_url)"
            echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)"
            echo "dynamodb_table_name=$(terraform output -raw dynamodb_table_name)"
          } >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    # Registration rollout order: Terraform opens Cognito first, then the API,
    # then the public form. This prevents a live signup CTA from reaching a
    # still-closed backend during a rolling release.
    needs: [validate, terraform, deploy-backend]
    outputs:
      rollback_snapshot_ready: ${{ steps.rollback_snapshot.outputs.ready }}
    # OIDC: assumes AWS_PRODUCTION_ROLE_ARN via configure-aws-credentials.
    permissions:
      id-token: write
      contents: read
    # Same `production` approval gate as the terraform + deploy-backend jobs:
    # an S3 sync + CloudFront invalidation to the live site is a prod mutation
    # and must not run on an untagged/unreviewed path.
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist-${{ needs.validate.outputs.version }}
          path: dist

      - name: Snapshot current frontend for rollback
        id: rollback_snapshot
        env:
          FRONTEND_BUCKET: ${{ needs.terraform.outputs.frontend_bucket }}
        run: |
          set -euo pipefail
          # A completed snapshot is immutable across both failed-job retries
          # and full workflow reruns. If no completion marker exists, the live
          # frontend has not yet been mutated by this job, so a partial copy can
          # safely be replaced before retrying.
          if aws s3api head-object \
            --bucket "$ARTIFACT_BUCKET" \
            --key "${FRONTEND_SNAPSHOT_PREFIX}/snapshot-complete" > /dev/null 2>&1; then
            aws s3api head-object \
              --bucket "$ARTIFACT_BUCKET" \
              --key "${FRONTEND_SNAPSHOT_PREFIX}/index.html" > /dev/null
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          aws s3 rm "s3://${ARTIFACT_BUCKET}/${FRONTEND_SNAPSHOT_PREFIX}/" \
            --recursive --only-show-errors
          aws s3 cp "s3://${FRONTEND_BUCKET}/" \
            "s3://${ARTIFACT_BUCKET}/${FRONTEND_SNAPSHOT_PREFIX}/" \
            --recursive --copy-props default --only-show-errors
          aws s3api head-object \
            --bucket "$ARTIFACT_BUCKET" \
            --key "${FRONTEND_SNAPSHOT_PREFIX}/index.html" > /dev/null
          aws s3api put-object \
            --bucket "$ARTIFACT_BUCKET" \
            --key "${FRONTEND_SNAPSHOT_PREFIX}/snapshot-complete" \
            --body /dev/null > /dev/null
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: |
          aws s3 sync dist s3://${{ needs.terraform.outputs.frontend_bucket }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html" \
            --exclude "*.json"

          aws s3 cp dist/index.html s3://${{ needs.terraform.outputs.frontend_bucket }}/index.html \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        env:
          CLOUDFRONT_ID: ${{ needs.terraform.outputs.cloudfront_id }}
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "$CLOUDFRONT_ID" \
            --id "$INVALIDATION_ID"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [validate, terraform]
    outputs:
      rollback_snapshot_ready: ${{ steps.rollback_snapshot.outputs.ready }}
    # OIDC: assumes AWS_PRODUCTION_ROLE_ARN via configure-aws-credentials.
    permissions:
      id-token: write
      contents: read
    # The `production` environment requires manual approval per its rule
    # configuration in GitHub. cd jobs gated on this won't run until a
    # required reviewer approves the deployment.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download backend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-dist-${{ needs.validate.outputs.version }}
          path: dist

      - name: Capture previous Lambda versions for rollback
        id: prev
        run: |
          set -euo pipefail
          versions=""
          # Keep this list in sync with the deploy loop below (and with
          # esbuild's dist/*.js bundles + the terraform function names).
          for handler in auth plants tasks households me notifications billing species climate apiKeys api reminders chat digests chat-stream; do
            FUNCTION_NAME="family-greenhouse-${handler}-production"
            # get-function without a qualifier reports Version "$LATEST",
            # which broke rollback (it looked for "<handler>-v\$LATEST.zip"
            # artifacts that can never exist — observed in the v0.2.0 run).
            # The newest PUBLISHED version number is what deploys archive.
            # $LATEST is a literal Lambda qualifier in the JMESPath expression.
            # shellcheck disable=SC2016
            ver=$(aws lambda list-versions-by-function --function-name "$FUNCTION_NAME" \
              --query 'max_by(Versions[?Version!=`$LATEST`], &to_number(Version)).Version' \
              --output text)
            versions="${versions}${handler}=${ver}\n"
          done
          printf '%b' "$versions" > prev-versions.txt
          cat prev-versions.txt

      - name: Upload prev-versions artifact (for rollback)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prev-versions-${{ needs.validate.outputs.version }}
          path: prev-versions.txt

      - name: Mark Lambda rollback snapshot ready
        id: rollback_snapshot
        run: echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Deploy Lambda functions
        run: |
          set -euo pipefail
          # esbuild emits ESM bundles named after the handler group
          # (e.g. `auth.js`). Each Lambda is wired with
          # `handler = "handler.handler"`, so the zip MUST contain a
          # `handler.mjs` (NOT `auth.js`) or the runtime can't load it.
          # The .mjs extension forces Node ESM regardless of any
          # package.json in the zip.
          # `chat`/`digests` were missing from this list (their code only
          # ever shipped via manual deploys); `chat-stream` is the streaming
          # chat Function URL Lambda (bundle dist/chat-stream.js — a
          # standalone esbuild entry, not a handler.ts group).
          for handler in auth plants tasks households me notifications billing species climate apiKeys api reminders chat digests chat-stream; do
            FUNCTION_NAME="family-greenhouse-${handler}-production"
            SRC="dist/${handler}.js"
            test -f "$SRC" || { echo "Missing bundle: $SRC"; exit 1; }

            WORK=$(mktemp -d)
            cp "$SRC" "${WORK}/handler.mjs"
            [ -f "${SRC}.map" ] && cp "${SRC}.map" "${WORK}/handler.mjs.map" || true
            (cd "$WORK" && zip -q -r "/tmp/${handler}.zip" .)

            PUBLISHED_VER=$(aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file "fileb:///tmp/${handler}.zip" \
              --publish --query 'Version' --output text)
            aws lambda wait function-updated-v2 --function-name "$FUNCTION_NAME"
            echo "  ✓ ${FUNCTION_NAME} (v${PUBLISHED_VER})"

            # Archive this version's zip keyed by the version number we just
            # published, so a later run's auto-rollback (which restores by
            # version number from prev-versions.txt) can actually find the
            # artifact. Without this, the rollback job's S3 source path is
            # never populated and rollback silently no-ops.
            aws s3 cp "/tmp/${handler}.zip" \
              "s3://${ARTIFACT_BUCKET}/lambda-versions/${handler}-v${PUBLISHED_VER}.zip" \
              --only-show-errors
            rm -rf "$WORK" "/tmp/${handler}.zip"
          done

      - name: Smoke test (public route proves routing + dispatch are live)
        env:
          API_URL: ${{ needs.terraform.outputs.api_url }}
        run: |
          url="${API_URL}/health"
          code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$url")
          echo "GET /health -> $code"
          cat /tmp/health.json
          test "$code" = "200" || { echo "Smoke test failed"; exit 1; }
          node -e "const h=require('/tmp/health.json'); if(h.status!=='ok'||h.components?.database!=='ok') process.exit(1)"

  smoke-tests:
    name: Post-deploy smoke (Playwright e2e against prod)
    runs-on: ubuntu-latest
    needs: [validate, terraform, deploy-frontend, deploy-backend]
    # OIDC: assumes AWS_PRODUCTION_ROLE_ARN for Cognito test-user create+delete.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Setup Node.js
        # No `cache: 'npm'` here (CICD-24): this job holds `id-token: write`
        # (needed for the Cognito test-user create+delete step below), and
        # actions/setup-node's cache writes to the GitHub Actions cache
        # service using the job's token — combining a broad OIDC grant with
        # cache read/write on the same job is exactly the pattern CICD-24
        # forbids. The other `id-token: write` jobs in this workflow
        # (terraform, deploy-frontend, deploy-backend) are already cache-free;
        # this was the one holdout.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Configure AWS credentials (Cognito admin for test-user create+delete)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Frontend HTTP reachability
        env:
          SITE_URL: ${{ needs.terraform.outputs.site_url }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL")
          test "$code" = "200" || { echo "Frontend HTTP $code"; exit 1; }

      - name: Critical-path e2e (post-deploy-smoke)
        working-directory: frontend
        env:
          E2E_BASE_URL: ${{ needs.terraform.outputs.site_url }}
          E2E_API_URL: ${{ needs.terraform.outputs.api_url }}
          E2E_USER_POOL_ID: ${{ needs.terraform.outputs.cognito_user_pool_id }}
          E2E_TABLE_NAME: ${{ needs.terraform.outputs.dynamodb_table_name }}
          E2E_PUBLIC_SIGNUP_EMAIL_TEMPLATE: ${{ secrets.E2E_PUBLIC_SIGNUP_EMAIL_TEMPLATE }}
        run: npx playwright test --config tests/e2e/playwright.smoke.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-smoke-report-${{ needs.validate.outputs.version }}
          path: frontend/playwright-report
          if-no-files-found: ignore

  cleanup-success-snapshot:
    name: Purge successful release rollback snapshot
    runs-on: ubuntu-latest
    needs: smoke-tests
    # Keep retention cleanup separate from smoke-tests: if deletion fails after
    # partially draining the versioned prefix, it must not turn a good deploy
    # into a rollback that now depends on that partially deleted snapshot.
    if: ${{ needs.smoke-tests.result == 'success' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout workflow cleanup helper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Purge all frontend snapshot versions and delete markers
        run: bash .github/scripts/purge-frontend-snapshot-versions.sh "$ARTIFACT_BUCKET" "$FRONTEND_SNAPSHOT_PREFIX"

  rollback:
    name: Auto-rollback production release
    runs-on: ubuntu-latest
    # Direct dependencies are required here because GitHub Actions does not
    # expose outputs/results through transitive `needs` relationships.
    needs: [validate, terraform, deploy-backend, deploy-frontend, smoke-tests]
    # The policy snapshot is taken before Terraform plans or applies. If any
    # later stage fails, restore that exact pre-deploy state (open or closed).
    if: ${{ always() && needs.terraform.outputs.registration_snapshot_ready == 'true' && needs.smoke-tests.result != 'success' }}
    # OIDC: assumes AWS_PRODUCTION_ROLE_ARN via configure-aws-credentials.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout tagged ref
        id: checkout
        # allow-silenced-gate: independent rollback branches continue; the final outcome verifier re-fails incomplete recovery
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate.outputs.version }}

      - name: Configure AWS credentials
        id: aws_credentials
        # allow-silenced-gate: independent rollback branches continue; the final outcome verifier re-fails incomplete recovery
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        id: terraform_setup
        # allow-silenced-gate: frontend and Lambda recovery do not depend on Terraform; the final verifier checks Cognito recovery
        continue-on-error: true
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Restore Cognito registration policy
        id: restore_registration
        if: ${{ always() && steps.checkout.outcome == 'success' && steps.aws_credentials.outcome == 'success' && steps.terraform_setup.outcome == 'success' }}
        # allow-silenced-gate: other recovery branches must still run; the final outcome verifier re-fails this job
        continue-on-error: true
        working-directory: infrastructure
        env:
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_git_sha: ${{ needs.validate.outputs.commit_sha }}
          REGISTRATION_ENABLED_BEFORE: ${{ needs.terraform.outputs.public_registration_enabled_before }}
          ADMIN_ONLY_BEFORE: ${{ needs.terraform.outputs.admin_create_user_only_before }}
          USER_POOL_ID_BEFORE: ${{ needs.terraform.outputs.cognito_user_pool_id_before }}
        run: |
          set -euo pipefail
          case "$REGISTRATION_ENABLED_BEFORE:$ADMIN_ONLY_BEFORE" in
            false:True|true:False) ;;
            *)
              echo "::error::Invalid pre-deploy Cognito policy snapshot"
              exit 1
              ;;
          esac
          test -n "$USER_POOL_ID_BEFORE" || {
            echo "::error::Pre-deploy Cognito user-pool snapshot is empty"
            exit 1
          }

          terraform init -input=false
          terraform plan -input=false \
            -var-file=environments/production/terraform.tfvars \
            -var="public_registration_enabled=${REGISTRATION_ENABLED_BEFORE}" \
            -target=module.auth.aws_cognito_user_pool.main \
            -out=rollback-auth.tfplan
          terraform apply -input=false -auto-approve rollback-auth.tfplan

          USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)
          test "$USER_POOL_ID" = "$USER_POOL_ID_BEFORE" || {
            echo "::error::Cognito user pool changed during deploy; targeted policy rollback is insufficient"
            exit 1
          }
          POLICY=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$USER_POOL_ID_BEFORE" \
            --query 'UserPool.AdminCreateUserConfig.AllowAdminCreateUserOnly' \
            --output text)
          test "$POLICY" = "$ADMIN_ONLY_BEFORE" || {
            echo "::error::Cognito registration policy was not restored to ${ADMIN_ONLY_BEFORE}"
            exit 1
          }

      - name: Restore previous frontend
        id: restore_frontend
        if: ${{ always() && needs.deploy-frontend.outputs.rollback_snapshot_ready == 'true' && steps.aws_credentials.outcome == 'success' }}
        # allow-silenced-gate: Lambda and Cognito recovery must still run; the final outcome verifier re-fails this job
        continue-on-error: true
        env:
          FRONTEND_BUCKET: ${{ needs.terraform.outputs.frontend_bucket }}
          CLOUDFRONT_ID: ${{ needs.terraform.outputs.cloudfront_id }}
        run: |
          set -euo pipefail
          # `cp` forces older snapshot objects over same-size newer objects;
          # the following sync removes assets introduced by the failed deploy.
          aws s3 cp "s3://${ARTIFACT_BUCKET}/${FRONTEND_SNAPSHOT_PREFIX}/" \
            "s3://${FRONTEND_BUCKET}/" \
            --recursive --exclude "snapshot-complete" --copy-props default --only-show-errors
          aws s3 sync "s3://${ARTIFACT_BUCKET}/${FRONTEND_SNAPSHOT_PREFIX}/" \
            "s3://${FRONTEND_BUCKET}/" \
            --delete --exclude "snapshot-complete" --copy-props default --only-show-errors

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths '/*' \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "$CLOUDFRONT_ID" \
            --id "$INVALIDATION_ID"

      - name: Download previous versions
        id: download_versions
        if: ${{ always() && needs.deploy-backend.outputs.rollback_snapshot_ready == 'true' }}
        # allow-silenced-gate: frontend and Cognito recovery remain independent; the final verifier checks this artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prev-versions-${{ needs.validate.outputs.version }}

      - name: Restore previous Lambda versions
        id: restore_backend
        if: ${{ always() && needs.deploy-backend.outputs.rollback_snapshot_ready == 'true' && steps.aws_credentials.outcome == 'success' && steps.download_versions.outcome == 'success' }}
        # allow-silenced-gate: frontend and Cognito recovery remain independent; the final outcome verifier re-fails this job
        continue-on-error: true
        run: |
          set -euo pipefail
          while IFS='=' read -r handler ver; do
            test -z "$handler" && continue
            FUNCTION_NAME="family-greenhouse-${handler}-production"
            echo "Rolling back ${FUNCTION_NAME} -> v${ver}"
            # Restore the previous version's code from the per-version zip the
            # deploy job archived to S3 (keyed by published version number).
            # `update-alias` would be cleaner once aliases exist; until then we
            # re-publish the previous version's code to $LATEST.
            #
            # A missing artifact means rollback CANNOT restore this function —
            # fail loudly instead of swallowing it. Silently no-oping here
            # leaves a broken deploy live while the workflow looks "rolled
            # back". Track every failure and exit non-zero at the end so the
            # operator is paged to finish the rollback by hand.
            if aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --s3-bucket "$ARTIFACT_BUCKET" \
              --s3-key "lambda-versions/${handler}-v${ver}.zip" \
              --publish > /dev/null 2>&1 && \
              aws lambda wait function-updated-v2 --function-name "$FUNCTION_NAME"; then
              echo "  ✓ ${FUNCTION_NAME} restored"
            else
              echo "::error::${FUNCTION_NAME}: prior-version restore failed (lambda-versions/${handler}-v${ver}.zip) — manual intervention required"
              rollback_failed=1
            fi
          done < prev-versions.txt

          if [ "${rollback_failed:-0}" = "1" ]; then
            echo "::error::One or more functions could not be rolled back (missing artifact). Production may be running broken code — investigate immediately."
            exit 1
          fi

      - name: Verify rollback outcome
        id: verify_rollback
        if: always()
        env:
          REGISTRATION_OUTCOME: ${{ steps.restore_registration.outcome }}
          FRONTEND_EXPECTED: ${{ needs.deploy-frontend.outputs.rollback_snapshot_ready }}
          FRONTEND_OUTCOME: ${{ steps.restore_frontend.outcome }}
          BACKEND_EXPECTED: ${{ needs.deploy-backend.outputs.rollback_snapshot_ready }}
          DOWNLOAD_OUTCOME: ${{ steps.download_versions.outcome }}
          BACKEND_OUTCOME: ${{ steps.restore_backend.outcome }}
        run: |
          set -euo pipefail
          failed=0

          if [ "$REGISTRATION_OUTCOME" != "success" ]; then
            echo "::error::Cognito registration policy restore outcome: ${REGISTRATION_OUTCOME}"
            failed=1
          fi
          if [ "$FRONTEND_EXPECTED" = "true" ] && [ "$FRONTEND_OUTCOME" != "success" ]; then
            echo "::error::Frontend restore outcome: ${FRONTEND_OUTCOME}"
            failed=1
          fi
          if [ "$BACKEND_EXPECTED" = "true" ] && { [ "$DOWNLOAD_OUTCOME" != "success" ] || [ "$BACKEND_OUTCOME" != "success" ]; }; then
            echo "::error::Backend restore outcomes: download=${DOWNLOAD_OUTCOME}, restore=${BACKEND_OUTCOME}"
            failed=1
          fi

          test "$failed" = "0"

      - name: Checkout workflow cleanup helper
        if: ${{ success() && steps.verify_rollback.outcome == 'success' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}
          path: cleanup-workflow-source
          persist-credentials: false

      - name: Purge completed rollback frontend snapshot versions and delete markers
        if: ${{ success() && steps.verify_rollback.outcome == 'success' }}
        run: bash cleanup-workflow-source/.github/scripts/purge-frontend-snapshot-versions.sh "$ARTIFACT_BUCKET" "$FRONTEND_SNAPSHOT_PREFIX"

      - name: Report successful rollback
        if: ${{ success() && steps.verify_rollback.outcome == 'success' }}
        run: |
          echo "::warning::Production deploy of ${{ needs.validate.outputs.version }} failed. The rollback restored the pre-deploy Cognito policy and every available frontend/Lambda snapshot. Review the Playwright report before redeploying."

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs:
      [validate, deploy-frontend, deploy-backend, smoke-tests, cleanup-success-snapshot, rollback]
    if: always()
    steps:
      - name: Deployment notification
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          SMOKE_RESULT: ${{ needs.smoke-tests.result }}
          CLEANUP_RESULT: ${{ needs.cleanup-success-snapshot.result }}
          ROLLBACK_RESULT: ${{ needs.rollback.result }}
        run: |
          if [ "$SMOKE_RESULT" == "success" ] && [ "$CLEANUP_RESULT" == "success" ]; then
            echo "Production deployment of $VERSION successful!"
          elif [ "$SMOKE_RESULT" == "success" ]; then
            echo "Production deployment of $VERSION succeeded, but rollback-snapshot retention cleanup failed!"
            exit 1
          elif [ "$ROLLBACK_RESULT" == "success" ]; then
            echo "Production deployment of $VERSION failed and was rolled back."
            exit 1
          else
            echo "Production deployment of $VERSION failed and rollback was incomplete or unavailable!"
            exit 1
          fi
