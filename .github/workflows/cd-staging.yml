name: Deploy to Staging

# State is now ISOLATED: the Terraform Apply step below inits with
# `-backend-config="key=staging/terraform.tfstate"`, so staging has its own
# state file and a staging apply can no longer touch the production stack
# (which lives under the default `terraform.tfstate` key). The prod-destruction
# landmine is closed.
#
# Still kept MANUAL (workflow_dispatch only), deliberately: a staging apply now
# stands up a full *separate* staging stack (Cognito/DDB/API/CloudFront...),
# which costs money — that should be an intentional choice, not something every
# push to main provisions. Re-enable `push: main` only when a standing staging
# environment is actually wanted.
on:
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  ENVIRONMENT: staging

# Least-privilege default: read-only token. Jobs that assume an AWS role via
# OIDC (aws-actions/configure-aws-credentials) grant `id-token: write` at the
# job level below; every other job runs with the read-only default.
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.STAGING_API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.STAGING_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.STAGING_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ env.AWS_REGION }}
        run: npm run build

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-dist
          path: backend/dist

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    # OIDC: assumes AWS_DEPLOY_ROLE_ARN via configure-aws-credentials.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infrastructure
    outputs:
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Terraform Init (isolated staging state)
        # Staging gets its OWN state key so it can never apply onto prod's state.
        run: terraform init -backend-config="key=staging/terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan -var-file=environments/staging/terraform.tfvars -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get outputs
        id: outputs
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: terraform
    # OIDC: assumes AWS_DEPLOY_ROLE_ARN via configure-aws-credentials.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-dist
          path: dist

      - name: Sync to S3
        run: |
          aws s3 sync dist s3://${{ needs.terraform.outputs.frontend_bucket }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html" \
            --exclude "*.json"

          aws s3 cp dist/index.html s3://${{ needs.terraform.outputs.frontend_bucket }}/index.html \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cloudfront_id }} \
            --paths "/*"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: terraform
    # OIDC: assumes AWS_DEPLOY_ROLE_ARN via configure-aws-credentials.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download backend artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-dist
          path: dist

      - name: Deploy Lambda functions
        run: |
          set -euo pipefail
          # See cd-production.yml for the explanation of why we repackage
          # each bundle as `handler.mjs`.
          for handler in auth plants tasks households me notifications billing species climate apiKeys api reminders; do
            FUNCTION_NAME="family-greenhouse-${handler}-staging"
            SRC="dist/${handler}.js"
            test -f "$SRC" || { echo "Missing bundle: $SRC"; exit 1; }
            WORK=$(mktemp -d)
            cp "$SRC" "${WORK}/handler.mjs"
            [ -f "${SRC}.map" ] && cp "${SRC}.map" "${WORK}/handler.mjs.map" || true
            (cd "$WORK" && zip -q -r "/tmp/${handler}.zip" .)
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file "fileb:///tmp/${handler}.zip" \
              --publish > /dev/null
            echo "  ✓ ${FUNCTION_NAME}"
            rm -rf "$WORK" "/tmp/${handler}.zip"
          done

      - name: Smoke test (public route proves routing + dispatch are live)
        run: |
          url="${{ vars.STAGING_API_URL }}/billing/plans"
          code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
          echo "GET /billing/plans -> $code"
          test "$code" = "200" || { echo "Smoke test failed"; exit 1; }

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: frontend
        env:
          BASE_URL: ${{ vars.STAGING_URL }}
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, e2e-tests]
    if: always()
    steps:
      - name: Deployment notification
        run: |
          if [ "${{ needs.deploy-frontend.result }}" == "success" ] && [ "${{ needs.deploy-backend.result }}" == "success" ]; then
            echo "Staging deployment successful!"
          else
            echo "Staging deployment failed!"
            exit 1
          fi
