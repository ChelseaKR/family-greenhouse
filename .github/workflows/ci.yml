name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # commitlint needs both the base and head commits in its range;
          # the default shallow clone (fetch-depth 1) leaves the base SHA
          # missing and fails with "Invalid revision range".
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: No bare TODO/FIXME/HACK markers
        # Shared with `npm run verify` (scripts/check-no-bare-markers.mjs) so
        # local pre-push and CI run the identical check — see CICD-27.
        run: node scripts/check-no-bare-markers.mjs

      - name: No silenced test/security/lint gates in workflows (P0-3)
        # Regression gate for the exact bypasses this remediation pass closed
        # (cd-staging.yml's continue-on-error on e2e; the skip-lighthouse
        # label). See scripts/check-no-silenced-gates.mjs.
        run: node scripts/check-no-silenced-gates.mjs

      - name: Check formatting
        run: npm run format:check

      - name: Verify API spec covers every handler route
        run: node scripts/check-api-spec.mjs

      - name: Verify observability and SLO contract
        run: npm run observability:check

      - name: Validate commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  i18n:
    name: i18n Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Catalog gates (key parity, placeholder parity, plural categories, TODO markers, BCP-47, UTF-8)
        # STANDARDS/INTERNATIONALIZATION-STANDARD.md §4 G1/G3/G5/G6 —
        # shared with `npm run verify` (frontend `i18n:check`) so local == CI.
        working-directory: frontend
        run: node scripts/check-i18n-catalogs.mjs

      - name: Hardcoded-string ratchet (no new untranslatable JSX text)
        # §4 G2 as a ratchet against scripts/i18n-hardcoded-baseline.json —
        # existing debt is pinned per file and may only shrink.
        working-directory: frontend
        run: node scripts/check-hardcoded-strings.mjs

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check - Frontend
        working-directory: frontend
        run: npm run typecheck

      - name: TypeScript check - Backend
        working-directory: backend
        run: npm run typecheck

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        working-directory: backend
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so gitleaks scans every commit, not just the tip —
          # a secret committed then removed still needs to be caught.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (high+critical gate the build)
        # Scoped to `--omit=dev` because dev tooling (vitest, vite, esbuild)
        # carries advisories that don't ship to prod and that we've chosen
        # to defer (the vite upgrade path is breaking; tracked alongside
        # the vite-6 migration). Critical CVEs in runtime deps still block.
        run: npm audit --omit=dev --audit-level=high

      - name: Run Gitleaks (license-free CLI, blocking)
        # Run the MIT-licensed binary directly so the gate stays independent
        # of repository visibility and action-wrapper licensing. A non-zero
        # exit blocks the build; `--redact` keeps any match out of the log.
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    # Semgrep OSS is free and tokenless — kept as a fast, always-on first pass.
    # CodeQL runs separately for this public repository in codeql.yml
    # (see SEC-08).
    # Runs the community rulesets relevant to our stack and gates on
    # ERROR-severity findings only — high-confidence issues, low
    # false-positive noise. Tune the rulesets / severity as the codebase grows.
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --severity ERROR \
            --error \
            --metrics off

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.5.7

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-frontend, test-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Upload backend artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-dist
          path: backend/dist

  lighthouse:
    name: Lighthouse (mobile + desktop)
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        profile: [desktop, mobile]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Need the merge-base/previous commit to diff against — see the
          # "Determine whether frontend changed" step below.
          fetch-depth: 0

      - name: Determine whether frontend changed
        # P0-3 fix: this job used to be skippable on any PR via a human-applied
        # "skip-lighthouse" label — an undocumented, unaudited bypass of the
        # only perf+a11y gate (OBS-23/24/25, A11Y-02). Replaced with an
        # automatic, un-label-able path check: the job always runs when the
        # diff touches frontend/** (or this workflow file), and no label can
        # override that. When the diff genuinely doesn't touch the frontend
        # (docs-only, backend-only, infra-only PRs), the run steps below no-op
        # instead — same speed benefit, no manual escape hatch.
        id: diff
        run: |
          BEFORE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # No usable base to diff against (e.g. a new branch's first push) —
            # fail open (run Lighthouse) rather than silently skip it.
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(frontend/|\.github/workflows/ci\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.diff.outputs.changed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.diff.outputs.changed == 'true'
        run: npm ci

      - name: Build frontend
        if: steps.diff.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: Run Lighthouse (${{ matrix.profile }})
        if: steps.diff.outputs.changed == 'true'
        working-directory: frontend
        run: npm run lighthouse:${{ matrix.profile }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-${{ matrix.profile }}
          path: frontend/.lighthouseci/${{ matrix.profile }}
          if-no-files-found: ignore

  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check bundle sizes
        working-directory: frontend
        run: npm run size

  e2e-a11y:
    name: E2E + accessibility (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e + a11y suite
        working-directory: frontend
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
