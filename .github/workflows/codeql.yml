name: CodeQL

# Family Greenhouse is a public repository, so CodeQL uploads findings to the
# repository's code-scanning view without requiring GitHub Advanced Security.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, independent of push/PR activity — catches newly-published CodeQL
    # query-pack findings against unchanged code, not just new commits.
    - cron: '17 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL analysis (javascript-typescript, actions)
    runs-on: ubuntu-latest
    permissions:
      # Analyze Actions workflows alongside JavaScript/TypeScript sources.
      actions: read
      contents: read
      # Publish SARIF findings to the public repository's code-scanning view.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        # javascript-typescript and actions are both interpreted languages
        # (no compile step) — build-mode: none covers both in one run.
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript, actions
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
