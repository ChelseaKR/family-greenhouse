name: CodeQL

# This repository is private and does not have GitHub Advanced Security.
# CodeQL still runs and preserves its SARIF as a workflow artifact; uploading
# to the code-scanning API is intentionally disabled because GitHub rejects it
# without GHAS. Re-enable `upload: always` if GHAS is enabled later.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, independent of push/PR activity — catches newly-published CodeQL
    # query-pack findings against unchanged code, not just new commits.
    - cron: '17 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL analysis (javascript-typescript, actions)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        # javascript-typescript and actions are both interpreted languages
        # (no compile step) — build-mode: none covers both in one run.
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript, actions
          build-mode: none

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          upload: never

      - name: Preserve CodeQL results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: codeql-sarif
          path: ${{ steps.analyze.outputs.sarif-output }}
          retention-days: 14
