name: E2E cross-browser (weekly)

# Closes the QM-03 compatibility gap: the per-PR e2e-a11y job runs
# chromium only, while the Playwright config has always declared
# firefox/webkit projects. This exercises the full e2e + a11y suite on
# both engines on a weekly cadence — compatibility drift is a
# slow-moving failure mode, so a scheduled sweep catches it without
# adding two more browser installs to every PR. `workflow_dispatch`
# allows an on-demand run (e.g. before a release, or after a change
# that smells engine-sensitive).
#
# The visual-regression spec skips itself under CI (macOS-only
# baselines); everything else runs.

on:
  schedule:
    # Tuesday 05:17 UTC — offset from the zizmor/scorecard Monday crons
    # so a shared failure day doesn't bury one alert under another.
    - cron: '17 5 * * 2'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  e2e:
    name: E2E + a11y (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run e2e + a11y suite
        working-directory: frontend
        run: npm run test:e2e -- --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/playwright-report
          if-no-files-found: ignore
