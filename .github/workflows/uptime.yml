name: Uptime check

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uptime-check
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check API health
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          test -n "$HEALTHCHECK_URL"
          response="$(curl --fail --silent --show-error --max-time 20 "$HEALTHCHECK_URL")"
          printf '%s' "$response" | jq -e '.status == "ok"' >/dev/null
