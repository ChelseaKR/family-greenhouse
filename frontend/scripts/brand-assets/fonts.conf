<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>
  <include ignore_missing="yes">/opt/homebrew/etc/fonts/fonts.conf</include>
  <!-- The renderer changes into frontend/, so cwd-relative paths resolve from
       there. FONTCONFIG_FILE keeps exported PNGs on the same self-hosted faces
       as the app instead of silently falling back to Georgia/Arial. -->
  <!-- The SVG rasterizer cannot load webfont WOFF2 files directly. This TTF
       is a deterministic 400-weight instance of our Bitter Variable package. -->
  <dir prefix="cwd">./scripts/brand-assets/fonts</dir>
  <alias>
    <family>Bitter Variable</family>
    <prefer><family>Bitter</family></prefer>
  </alias>
  <dir prefix="cwd">../node_modules/@fontsource-variable/instrument-sans/files</dir>
  <cachedir prefix="xdg">fontconfig</cachedir>
</fontconfig>
