  <text x="74" y="200" font-family="Gloock, Georgia, serif" font-size="62" font-weight="400" fill="#F7F8F2">
    <tspan x="74" dy="0">Plant care,</tspan>
    <tspan x="74" dy="68">shared.</tspan>
  </text>
  <text x="78" y="338" font-family="Instrument Sans, Arial, sans-serif" font-size="24" fill="#DDEEE7">
