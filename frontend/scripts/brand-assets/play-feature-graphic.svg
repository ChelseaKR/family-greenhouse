<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" role="img" aria-labelledby="title desc">
  <title id="title">Family Greenhouse</title>
  <desc id="desc">Plant care, shared. Reminders, schedules, and one care log for the whole household.</desc>
  <rect width="1024" height="500" fill="#173404"/>

  <!-- Quiet greenhouse geometry keeps the edges useful when Play crops the art. -->
