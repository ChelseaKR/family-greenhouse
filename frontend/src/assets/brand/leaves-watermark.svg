<!-- Repeating botanical watermark tile, 200×200px. Drop in as a CSS
     background-image at very low opacity (4-6%) behind cards or page
     content. Stroked in currentColor so the tone matches the consumer. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Sprig top-left -->
  <g transform="translate(20 25) rotate(-22)">
    <path d="M 0 40 Q 0 20 0 0"/>
    <path d="M 0 14 Q -10 12 -14 18 Q -8 20 0 16 Z" fill="currentColor" opacity="0.45"/>
    <path d="M 0 26 Q 10 24 14 30 Q 6 32 0 28 Z" fill="currentColor" opacity="0.45"/>
  </g>
  <!-- Single leaf center-right -->
  <g transform="translate(140 80) rotate(20)">
    <path d="M 0 0 C -14 -4, -22 8, -18 22 C -14 32, 0 30, 8 20 C 14 8, 8 -4, 0 0 Z" fill="currentColor" opacity="0.5"/>
    <path d="M -8 6 Q -2 14 6 18" stroke-width="1"/>
  </g>
  <!-- Trio of small leaves bottom-left -->
  <g transform="translate(45 145) rotate(8)">
    <path d="M 0 18 Q 0 8 0 -2"/>
    <path d="M 0 6 Q -8 4 -12 10 Q -6 12 0 8 Z" fill="currentColor" opacity="0.45"/>
    <path d="M 0 14 Q 8 12 12 18 Q 6 20 0 16 Z" fill="currentColor" opacity="0.45"/>
  </g>
  <!-- Single sprig bottom-right -->
  <g transform="translate(160 158) rotate(-12)">
    <path d="M 0 22 Q 0 12 0 2"/>
    <circle cx="0" cy="2" r="2" fill="currentColor" opacity="0.5"/>
    <path d="M 0 12 Q -8 10 -12 16 Q -6 18 0 14 Z" fill="currentColor" opacity="0.45"/>
  </g>
</svg>
