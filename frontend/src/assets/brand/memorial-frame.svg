<!-- Decorative frame for the "In loving memory of my mom, Joyce" closing line
     at the bottom of the app shell. Two botanical sprigs (mirrored) flanking
     the text. ~360×40, sized via consumer's CSS. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left sprig — curves toward the right -->
  <g transform="translate(40 20)">
    <path d="M -28 0 Q -10 0 4 -8"/>
    <!-- Two leaves stacking up the curve -->
    <path d="M -14 -2 Q -20 -10 -10 -12 Q -8 -6 -14 -2 Z" fill="currentColor" opacity="0.7"/>
    <path d="M 0 -6 Q -4 -14 6 -16 Q 8 -10 0 -6 Z" fill="currentColor" opacity="0.7"/>
    <circle cx="4" cy="-8" r="2" fill="currentColor" opacity="0.85" stroke="none"/>
  </g>
  <!-- Right sprig — mirror -->
  <g transform="translate(320 20) scale(-1 1)">
    <path d="M -28 0 Q -10 0 4 -8"/>
    <path d="M -14 -2 Q -20 -10 -10 -12 Q -8 -6 -14 -2 Z" fill="currentColor" opacity="0.7"/>
    <path d="M 0 -6 Q -4 -14 6 -16 Q 8 -10 0 -6 Z" fill="currentColor" opacity="0.7"/>
    <circle cx="4" cy="-8" r="2" fill="currentColor" opacity="0.85" stroke="none"/>
  </g>
</svg>
