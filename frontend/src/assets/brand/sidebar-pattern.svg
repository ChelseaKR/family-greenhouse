<!-- Sidebar botanical texture, 280×400 tile. Sparser than the watermark —
     a few stray leaves and dots that read as a "garden in the margins"
     when overlaid at ~7% opacity against the dark green sidebar. Drawn
     in white-ish stroke so it picks up the sidebar's dark background. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 400" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Top sprig -->
  <g transform="translate(40 70) rotate(-15)">
    <path d="M 0 28 Q 0 14 0 0"/>
    <path d="M 0 8 Q -12 6 -16 14 Q -8 16 0 10 Z" fill="#ffffff" opacity="0.7"/>
    <path d="M 0 18 Q 12 16 16 24 Q 8 26 0 20 Z" fill="#ffffff" opacity="0.7"/>
  </g>
  <!-- Mid-right single leaf -->
  <g transform="translate(220 180) rotate(18)">
    <path d="M 0 0 C -18 -5, -28 10, -22 28 C -16 40, 4 38, 14 26 C 22 12, 12 -5, 0 0 Z" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Bottom-left trio -->
  <g transform="translate(55 320) rotate(10)">
    <path d="M 0 22 Q 0 10 0 -2"/>
    <path d="M 0 8 Q -10 6 -14 12 Q -8 14 0 10 Z" fill="#ffffff" opacity="0.7"/>
    <path d="M 0 16 Q 10 14 14 22 Q 8 24 0 18 Z" fill="#ffffff" opacity="0.7"/>
    <circle cx="0" cy="-2" r="2" fill="#ffffff" opacity="0.7"/>
  </g>
  <!-- A few seed dots for texture -->
  <circle cx="170" cy="100" r="2" fill="#ffffff" opacity="0.5" stroke="none"/>
  <circle cx="100" cy="240" r="1.5" fill="#ffffff" opacity="0.5" stroke="none"/>
  <circle cx="230" cy="350" r="2" fill="#ffffff" opacity="0.5" stroke="none"/>
</svg>
