<!-- Hand-drawn underline that sits beneath page titles. Slight tilt + variable
     stroke width = the "made by a hand" feel that flat borders miss. Use
     `aria-hidden` at the consumer. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 14" fill="none" stroke="currentColor" stroke-linecap="round">
  <!-- Underline: gentle curve, thicker in the middle by overlaying two strokes -->
  <path d="M 6 8 Q 60 4 120 7 T 234 8" stroke-width="3" opacity="0.85"/>
  <path d="M 30 9 Q 100 6 160 8 T 220 9" stroke-width="2" opacity="0.5"/>
  <!-- Two tiny seed dots at the ends for botanical flavor -->
  <circle cx="6" cy="8" r="2" fill="currentColor" stroke="none" opacity="0.7"/>
  <circle cx="234" cy="8" r="2" fill="currentColor" stroke="none" opacity="0.7"/>
</svg>
